name: Metrics

on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AryaManojMishra
          template: classic
          base: header, activity, community

          plugin_languages: yes
          plugin_isocalendar: yes
          plugin_lines: yes
          plugin_achievements: yes
