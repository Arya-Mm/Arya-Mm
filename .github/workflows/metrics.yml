name: Metrics

on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Arya-Mm

          template: classic
          base: header, activity, community

          plugin_languages: yes
          plugin_languages_limit: 8

          plugin_isocalendar: yes

          plugin_lines: yes

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          
          plugin_repositories: yes
          plugin_repositories_pinned: 6
          
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          plugin_achievements: yes
          plugin_achievements_threshold: X
          plugin_achievements_display: detailed
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, languages
          plugin_skyline: yes
          plugin_skyline_year: 2026
          plugin_screenshot: yes
          plugin_screenshot_title: Project Preview
          plugin_screenshot_url: https://pin.it/mfnlLnXgD
          plugin_screenshot_selector: body
          plugin_screenshot_background: yes
