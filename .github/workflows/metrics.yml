name: Metrics

on:
  schedule: [{ cron: "0 */12 * * *" }]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Arya-Mm

          template: classic
          base: header, activity, community

          # timezone for habits charts
          config_timezone: Asia/Kolkata

          # languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_analysis: yes

          # commit calendar
          plugin_isocalendar: yes

          # lines changed
          plugin_lines: yes

          # recent activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_timestamps: yes

          # repositories
          plugin_repositories: yes
          plugin_repositories_pinned: 6

          # coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic

          # achievements
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: X

          # skyline
          plugin_skyline: yes
          plugin_skyline_year: 2026
          plugin_skyline_frames: 6
          plugin_skyline_quality: 0.5

          # wakatime (disable if no API key)
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, languages

          # screenshot
          plugin_screenshot: yes
          plugin_screenshot_title: Current Mood
          plugin_screenshot_url: https://i.pinimg.com/736x/b1/4a/50/b14a5070737e7195a6838cb15b052193.jpg
          plugin_screenshot_background: no
